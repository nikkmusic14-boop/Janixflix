<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#070916"/>
      <stop offset="100%" stop-color="#131737"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background circle with smooth dark gradient -->
  <rect width="512" height="512" rx="128" fill="url(#g2)" stroke="rgba(0, 243, 255, 0.12)" stroke-width="8"/>
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#g1)" stroke-width="16" filter="url(#glow)" opacity="0.9"/>
  <!-- Stylized Glowing Heart in Center -->
  <path d="M256,395 C230,370 120,290 120,185 C120,120 170,70 220,70 C236,70 248,92 256,105 C264,92 276,70 292,70 C342,70 392,120 392,185 C392,290 282,370 256,395 Z" fill="url(#g1)" filter="url(#glow)"/>
</svg>
