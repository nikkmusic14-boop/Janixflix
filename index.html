<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Streamer</title>
    <!-- Linking external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Movie Streamer</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for movies...">
            <button id="searchBtn">Search</button>
        </div>
    </header>

    <main>
        <!-- Movie Grid Section -->
        <section id="movieGrid" class="grid-container">
            <!-- Movies will be injected here by JS -->
        </section>

        <!-- Video Player Section (Hidden by default) -->
        <section id="playerSection" class="hidden">
            <button id="backBtn">Back to Movies</button>
            <h2 id="nowPlayingTitle">Now Playing</h2>
            <div class="video-container">
                <video id="videoPlayer" controls>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </section>
    </main>

    <!-- Linking external JS -->
    <script src="script.js"></script>
</body>
</html>
